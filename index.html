<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoGestao - Compra e Venda de Veiculos</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1d4ed8" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AutoGestao" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1d4ed8; --primary-light: #dbeafe;
      --success: #16a34a; --success-light: #dcfce7;
      --danger: #dc2626;  --danger-light: #fee2e2;
      --warning: #d97706; --warning-light: #fef3c7;
      --orange: #ea580c;  --orange-light: #ffedd5;
      --g50:#f8fafc; --g100:#f1f5f9; --g200:#e2e8f0; --g300:#cbd5e1;
      --g400:#94a3b8; --g500:#64748b; --g600:#475569; --g700:#334155;
      --g800:#1e293b; --g900:#0f172a;
      --sw: 240px; --r: 10px;
      --sh: 0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
      --shm: 0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
      --shl: 0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
    }
    html,body{height:100%;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--g100);color:var(--g800);font-size:14px}
    #app{display:flex;height:100vh;overflow:hidden}
    #sidebar{width:var(--sw);background:var(--g900);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
    .sl{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
    .sl .t{font-size:1.1rem;font-weight:700;color:#fff;line-height:1.2}
    .sl .s{font-size:.75rem;color:var(--g400);margin-top:2px}
    .sn{padding:12px 8px;flex:1}
    .lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--g500);padding:14px 12px 6px;font-weight:600}
    .ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--g400);font-size:.88rem;font-weight:500;transition:background .15s,color .15s;margin-bottom:2px}
    .ni:hover{background:rgba(255,255,255,.06);color:#fff}
    .ni.active{background:var(--primary);color:#fff}
    .ni .ic{font-size:1rem;width:20px;text-align:center}
    #main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
    .tb{background:#fff;border-bottom:1px solid var(--g200);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .tb-t{font-size:1rem;font-weight:600;color:var(--g800)}
    .pg{padding:28px;flex:1}
    .kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
    .kc{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);display:flex;align-items:flex-start;gap:16px}
    .ki{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
    .kc .lb{font-size:.78rem;color:var(--g500);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
    .kc .vl{font-size:1.5rem;font-weight:700;color:var(--g800);margin-top:4px;line-height:1}
    .kc .sb{font-size:.78rem;color:var(--g400);margin-top:4px}
    .card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
    .ch{padding:16px 20px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .ch h2{font-size:.95rem;font-weight:600;color:var(--g800)}
    .cb{padding:20px}
    .card+.card{margin-top:20px}
    .tw{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    th{background:var(--g50);padding:10px 14px;text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--g500);font-weight:600;border-bottom:1px solid var(--g200);white-space:nowrap}
    td{padding:12px 14px;border-bottom:1px solid var(--g100);color:var(--g700);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--g50)}
    .es{padding:40px 20px;text-align:center;color:var(--g400)}
    .es .ic{font-size:2.5rem;margin-bottom:10px}
    .es p{font-size:.9rem}
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:.73rem;font-weight:600;white-space:nowrap}
    .bg{background:var(--success-light);color:var(--success)}
    .by{background:var(--warning-light);color:var(--warning)}
    .bb{background:var(--primary-light);color:var(--primary)}
    .bgr{background:var(--g100);color:var(--g600)}
    .bo{background:var(--orange-light);color:var(--orange)}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:.85rem;font-weight:500;cursor:pointer;border:none;transition:filter .15s,transform .1s;white-space:nowrap}
    .btn:active{transform:scale(.98)}
    .bp{background:var(--primary);color:#fff}
    .bp:hover{filter:brightness(1.1)}
    .bs{background:var(--success);color:#fff}
    .bs:hover{filter:brightness(1.1)}
    .bd{background:var(--danger);color:#fff}
    .bd:hover{filter:brightness(1.1)}
    .bg2{background:transparent;color:var(--g600);border:1px solid var(--g200)}
    .bg2:hover{background:var(--g50)}
    .bsm{padding:5px 10px;font-size:.78rem}
    .bic{padding:5px 8px}
    .fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
    .ffc{grid-column:1/-1}
    .fd{display:flex;flex-direction:column;gap:5px}
    .fd label{font-size:.8rem;font-weight:600;color:var(--g600)}
    .fd input,.fd select,.fd textarea{padding:9px 12px;border:1px solid var(--g300);border-radius:7px;font-size:.9rem;color:var(--g800);background:#fff;transition:border-color .15s,box-shadow .15s;font-family:inherit}
    .fd input:focus,.fd select:focus,.fd textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(29,78,216,.12)}
    .fd textarea{resize:vertical;min-height:80px}
    .fd .ht{font-size:.75rem;color:var(--g400)}
    .fa{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--g100)}
    .mo{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fi .15s ease}
    .mo.hidden{display:none}
    .md{background:#fff;border-radius:12px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:var(--shl);animation:su .2s ease}
    .mh{padding:20px 24px 16px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
    .mh h3{font-size:1rem;font-weight:600}
    .mb{padding:20px 24px 24px}
    .mc{background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--g400);line-height:1;padding:2px}
    .mc:hover{color:var(--g700)}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    @keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .sb-w{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
    .si-w{position:relative;flex:1;min-width:180px}
    .si-w input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--g300);border-radius:7px;font-size:.85rem;color:var(--g800)}
    .si-w input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(29,78,216,.12)}
    .si-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:.9rem;pointer-events:none}
    .dg{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .rl{list-style:none}
    .ri{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--g100)}
    .ri:last-child{border-bottom:none}
    .rd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .rd.compra{background:var(--danger)}
    .rd.venda{background:var(--success)}
    .ri-i{flex:1;min-width:0}
    .ri-t{font-size:.85rem;font-weight:500;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ri-s{font-size:.78rem;color:var(--g400)}
    .ri-v{font-size:.85rem;font-weight:600;white-space:nowrap}
    .vr{color:var(--danger)}.vg{color:var(--success)}
    .pbt td:first-child{font-weight:500}
    .pbw{display:flex;align-items:center;gap:8px}
    .pb{height:8px;border-radius:4px;background:var(--success);min-width:4px}
    .pb.ng{background:var(--danger)}
    .fs{padding:8px 12px;border:1px solid var(--g300);border-radius:7px;font-size:.85rem;color:var(--g700);cursor:pointer}
    @media(max-width:768px){
      #sidebar{width:52px}
      .sl .t,.sl .s,.lbl,.ni span{display:none}
      .ni{justify-content:center;padding:10px}
      .dg{grid-template-columns:1fr}
      .pg{padding:16px}
      .tb{padding:0 16px}
    }
    .tr{text-align:right}.tm{font-family:"Courier New",monospace}.fb{font-weight:700}.mt4{margin-top:16px}
    .fl{display:flex}.ac{align-items:center}.g2{gap:8px}.lp{color:var(--success);font-weight:600}.ln{color:var(--danger);font-weight:600}
    .mu{color:var(--g400);font-size:.82rem}
    .cm .md{max-width:400px}
    .cfb{padding:24px}
    .cfb p{color:var(--g600);margin-bottom:20px;font-size:.9rem}
    .cfa{display:flex;gap:10px;justify-content:flex-end}
    #tc{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px}
    .ts{padding:12px 18px;border-radius:8px;color:#fff;font-size:.87rem;box-shadow:var(--shm);animation:si2 .2s ease;max-width:300px}
    .ts-s{background:var(--success)}.ts-e{background:var(--danger)}.ts-i{background:var(--primary)}
    @keyframes si2{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
    /* parcela rows */
    .parc-block{border:1px solid var(--g200);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
    .parc-hdr{padding:12px 16px;background:var(--g50);display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:8px}
    .parc-hdr:hover{background:var(--g100)}
    .parc-body{display:none;padding:0}
    .parc-body.open{display:block}
    .parc-row{display:flex;align-items:center;padding:8px 16px;border-top:1px solid var(--g100);gap:10px;font-size:.83rem}
    .parc-row:hover{background:var(--g50)}
    .parc-num{width:36px;font-weight:600;color:var(--g500);flex-shrink:0}
    .parc-date{width:90px;flex-shrink:0}
    .parc-val{width:100px;text-align:right;font-weight:600;flex-shrink:0}
    .parc-sta{flex:1}
    .parc-btn{flex-shrink:0}
    .alert-bar{background:var(--danger-light);border:1px solid #fca5a5;border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:.88rem;color:var(--danger)}
    .alert-bar.warn{background:var(--warning-light);border-color:#fcd34d;color:var(--warning)}
    .prog-bar-bg{height:6px;background:var(--g200);border-radius:3px;flex:1}
    .prog-bar{height:6px;background:var(--success);border-radius:3px}
    .prog-bar.partial{background:var(--warning)}
    .prog-bar.zero{background:var(--g300)}
    /* Mobile bottom nav */
    .mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:62px;background:var(--g900);z-index:500;flex-direction:row;justify-content:space-around;align-items:center;border-top:1px solid rgba(255,255,255,.12);padding:0 2px}
    .mob-ni{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:4px 4px;color:var(--g400);cursor:pointer;border-radius:8px;flex:1;min-width:0}
    .mob-ni.active{color:#fff}
    .mob-ni .ic{font-size:1.4rem;line-height:1.1}
    .mob-ni .lb{font-size:.6rem;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52px;text-align:center}
    @media(max-width:768px){.mob-nav{display:flex}#sidebar{display:none}#main{padding-bottom:68px}}
    /* Parcela edit rows */
    .pe-row{display:flex;align-items:center;gap:6px;padding:7px 4px;border-bottom:1px solid var(--g100)}
    .pe-num{width:24px;font-size:.78rem;color:var(--g400);flex-shrink:0;text-align:center}
    .pe-row input[type="date"],.pe-row input[type="number"]{padding:5px 7px;border:1px solid var(--g300);border-radius:6px;font-size:.82rem;color:var(--g800);background:#fff}
    .pe-row input[type="date"]{flex:1;min-width:100px}
    .pe-row input[type="number"]{width:86px}
    .pe-ck{display:flex;align-items:center;gap:3px;font-size:.78rem;color:var(--g600);white-space:nowrap;flex-shrink:0}
  </style>
</head>
<body>
<div id="app">

</div>

<nav class="mob-nav" id="mob-nav">

  <div class="mob-ni" data-page="compras"><span class="ic">&#x1F6D2;</span><span class="lb">Compras</span></div>
  <div class="mob-ni" data-page="vendas"><span class="ic">&#x1F4B0;</span><span class="lb">Vendas</span></div>

  <div class="mob-ni" data-page="relatorios"><span class="ic">&#x1F4C8;</span><span class="lb">Relatos</span></div>
</nav>

<div class="mo hidden" id="mo">
  <div class="md">
    <div class="mh"><h3 id="m-title">-</h3><button class="mc" id="m-close">&#x2715;</button></div>
    <div class="mb" id="m-body"></div>
  </div>
</div>

<div class="mo hidden cm" id="co">
  <div class="md">
    <div class="mh"><h3 id="c-title">Confirmar</h3><button class="mc" id="c-close">&#x2715;</button></div>
    <div class="cfb">
      <p id="c-msg"></p>
      <div class="cfa">
        <button class="btn bg2" id="c-cancel">Cancelar</button>
        <button class="btn bd" id="c-ok">Confirmar</button>
      </div>
    </div>
  </div>
</div>

<div id="tc"></div>

<script>
var STORE_KEY = 'autogestao_v2';
var PEST = 'estoque';
var PCOMP = 'compras';
var PVEN = 'vendas';
var PPARCL = 'parcelamentos';
var state = loadState();

function getSeed() {
  try {
    var el = document.getElementById('seed-data');
    if (el) return JSON.parse(el.textContent);
  } catch(e) {}
  return { vehicles: [], purchases: [], sales: [], parcelamentos: [] };
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      var s = JSON.parse(raw);
      if (!s.parcelamentos) { s.parcelamentos = getSeed().parcelamentos; }
      return s;
    }
  } catch(e) {}
  return getSeed();
}

function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function fmtBRL(n) {
  return Number(n||0).toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
}

function fmtDate(d) {
  if (!d) return '-';
  var p = d.split('-');
  if (p.length !== 3) return d;
  return p[2]+'/'+p[1]+'/'+p[0];
}

function todayISO() { return new Date().toISOString().slice(0,10); }

function diffDays(isoA, isoB) {
  var a = new Date(isoA), b = new Date(isoB);
  return Math.round((a - b) / 86400000);
}

function g(id) { return document.getElementById(id); }

function vehicleLabel(v) {
  if (!v) return '-';
  return v.marca + ' ' + v.modelo + (v.placa ? ' - '+v.placa : '') + (v.ano ? ' ('+v.ano+')' : '');
}

function vehicleById(id) {
  for (var i=0; i<state.vehicles.length; i++) {
    if (state.vehicles[i].id===id) return state.vehicles[i];
  }
  return null;
}

function purchaseByVehicle(vid) {
  for (var i=0; i<state.purchases.length; i++) {
    if (state.purchases[i].vehicleId===vid) return state.purchases[i];
  }
  return null;
}

function saleByVehicle(vid) {
  for (var i=0; i<state.sales.length; i++) {
    if (state.sales[i].vehicleId===vid) return state.sales[i];
  }
  return null;
}

function prop(obj, key, def) {
  return (obj && obj[key]!==undefined && obj[key]!==null && obj[key]!=='') ? obj[key] : (def!==undefined ? def : '');
}

function formToObj(form) {
  var obj={}, els=form.elements;
  for (var i=0; i<els.length; i++) {
    var el=els[i];
    if (el.name && !el.disabled) {
      obj[el.name] = el.type==='checkbox' ? (el.checked ? el.value : '') : el.value;
    }
  }
  return obj;
}

/* Toast */
function showToast(msg, type) {
  type = type||'success';
  var el = document.createElement('div');
  el.className = 'ts ts-'+type.charAt(0);
  el.textContent = msg;
  g('tc').appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 3200);
}

/* Confirm */
var _confirmResolve = null;
function showConfirm(msg, title) {
  g('c-title').textContent = title||'Confirmar?';
  g('c-msg').textContent = msg;
  g('co').classList.remove('hidden');
  return new Promise(function(res){ _confirmResolve=res; });
}
function confirmOk() { g('co').classList.add('hidden'); if(_confirmResolve) _confirmResolve(true); _confirmResolve=null; }
function confirmCancel() { g('co').classList.add('hidden'); if(_confirmResolve) _confirmResolve(false); _confirmResolve=null; }
g('c-ok').onclick=confirmOk; g('c-cancel').onclick=confirmCancel; g('c-close').onclick=confirmCancel;
g('co').onclick=function(e){ if(e.target===g('co')) confirmCancel(); };

/* Modal */
function openModal(title, html) { g('m-title').textContent=title; g('m-body').innerHTML=html; g('mo').classList.remove('hidden'); }
function closeModal() { g('mo').classList.add('hidden'); g('m-body').innerHTML=''; }
g('m-close').onclick=closeModal;
g('mo').onclick=function(e){ if(e.target===g('mo')) closeModal(); };

/* Nav */
var currentPage='dashboard';
var PAGE_TITLES={ dashboard:'Dashboard', estoque:'Estoque de Veiculos', compras:'Registro de Compras', vendas:'Registro de Vendas', parcelamentos:'Controle de Parcelamentos', relatorios:'Relatorios Financeiros' };

function navigate(page) {
  currentPage=page;
  var items=document.querySelectorAll('.ni,.mob-ni');
  for (var i=0; i<items.length; i++) {
    if (items[i].dataset.page===page) items[i].classList.add('active');
    else items[i].classList.remove('active');
  }
  g('tb-title').textContent=PAGE_TITLES[page]||page;
  renderPage(page);
}

var navItems=document.querySelectorAll('.ni,.mob-ni');
for (var _i=0; _i<navItems.length; _i++) {
  (function(el){ el.onclick=function(){ navigate(el.dataset.page); }; })(navItems[_i]);
}

function renderPage(page) {
  var c=g('content');
  if (page==='dashboard') c.innerHTML=pageDashboard();
  else if (page===PEST) c.innerHTML=pageEstoque();
  else if (page===PCOMP) c.innerHTML=pageCompras();
  else if (page===PVEN) c.innerHTML=pageVendas();
  else if (page===PPARCL) c.innerHTML=pageParcelamentos();
  else if (page==='relatorios') c.innerHTML=pageRelatorios();
}

/* Status badge */
function statusBadge(s) {
  if (s==='disponivel') return '<span class="badge bg">Disponivel</span>';
  if (s==='reservado') return '<span class="badge by">Reservado</span>';
  if (s==='vendido') return '<span class="badge bb">Vendido</span>';
  return '<span class="badge bgr">'+(s||'-')+'</span>';
}

/* Parcela status badge */
function parcelaBadge(p, today) {
  if (p.pago) return '<span class="badge bg">Pago</span>';
  var d = diffDays(p.vencimento, today);
  if (d < 0) return '<span class="badge bd">Vencida '+Math.abs(d)+'d</span>';
  if (d <= 7) return '<span class="badge bo">Vence em '+d+'d</span>';
  if (d <= 30) return '<span class="badge by">Em '+d+'d</span>';
  return '<span class="badge bgr">Pendente</span>';
}

/* ---- DASHBOARD ---- */
function pageDashboard() {
  var estoque=[], reservado=[], vendidos=[];
  for (var i=0; i<state.vehicles.length; i++) {
    var v=state.vehicles[i];
    if (v.status==='disponivel') estoque.push(v);
    else if (v.status==='reservado') reservado.push(v);
    else if (v.status==='vendido') vendidos.push(v);
  }
  var totalInvest=0, esRes=estoque.concat(reservado);
  for (var j=0; j<esRes.length; j++) { var pp=purchaseByVehicle(esRes[j].id); if(pp) totalInvest+=Number(pp.valor||0); }
  var totalReceb=0, totalCusto=0;
  for (var k=0; k<vendidos.length; k++) {
    var sv=saleByVehicle(vendidos[k].id); var pv=purchaseByVehicle(vendidos[k].id);
    if(sv) totalReceb+=Number(sv.valor||0); if(pv) totalCusto+=Number(pv.valor||0);
  }
  var lucro=totalReceb-totalCusto;
  var lucroClass=lucro>=0?'lp':'ln';
  var margemStr=vendidos.length>0?('Margem: '+(totalCusto>0?((lucro/totalCusto)*100).toFixed(1):'0')+'%'):'Sem vendas';

  // Parcelamentos summary
  var today=todayISO();
  var vencidas=0, aVencer30=0, totalRecebParc=0, totalParc=0;
  for (var pi=0; pi<state.parcelamentos.length; pi++) {
    var grupo=state.parcelamentos[pi];
    for (var pj=0; pj<grupo.parcelas.length; pj++) {
      var parc=grupo.parcelas[pj];
      totalParc+=parc.valor;
      if (parc.pago) { totalRecebParc+=parc.valor; continue; }
      var dd=diffDays(parc.vencimento, today);
      if (dd<0) vencidas++;
      else if (dd<=30) aVencer30++;
    }
  }

  var alertHtml='';
  if (vencidas>0) {
    alertHtml='<div class="alert-bar">&#x26A0;&#xFE0F; '+vencidas+' parcela(s) VENCIDA(S)! <button class="btn bd bsm" style="margin-left:auto" onclick="navigate(PPARCL)">Ver agora</button></div>';
  } else if (aVencer30>0) {
    alertHtml='<div class="alert-bar warn">&#x1F514; '+aVencer30+' parcela(s) vencem nos proximos 30 dias. <button class="btn bg2 bsm" style="margin-left:auto" onclick="navigate(PPARCL)">Ver</button></div>';
  }

  var actArr=[];
  for (var pa=0; pa<state.purchases.length; pa++) {
    var pu=state.purchases[pa];
    if (!pu.data) continue;
    actArr.push({type:'compra',date:pu.data||'',valor:-Number(pu.valor||0),label:vehicleLabel(vehicleById(pu.vehicleId))});
  }
  for (var sa=0; sa<state.sales.length; sa++) {
    var sl=state.sales[sa];
    if (!sl.data) continue;
    actArr.push({type:'venda',date:sl.data||'',valor:Number(sl.valor||0),label:vehicleLabel(vehicleById(sl.vehicleId))});
  }
  actArr.sort(function(a,b){ return b.date>a.date?1:-1; });
  if (actArr.length>8) actArr=actArr.slice(0,8);

  var actHtml='';
  if (actArr.length===0) {
    actHtml='<p class="mu" style="text-align:center;padding:20px 0">Nenhuma atividade datada ainda.</p>';
  } else {
    actHtml='<ul class="rl">';
    for (var ai=0; ai<actArr.length; ai++) {
      var a=actArr[ai];
      var vc=a.type==='compra'?'vr':'vg'; var sign=a.type==='compra'?'-':'+';
      actHtml+='<li class="ri"><div class="rd '+a.type+'"></div>';
      actHtml+='<div class="ri-i"><div class="ri-t">'+a.label+'</div>';
      actHtml+='<div class="ri-s">'+(a.type==='compra'?'Compra':'Venda')+' - '+fmtDate(a.date)+'</div></div>';
      actHtml+='<div class="ri-v '+vc+'">'+sign+fmtBRL(Math.abs(a.valor))+'</div></li>';
    }
    actHtml+='</ul>';
  }

  var sumHtml='';
  if (state.vehicles.length===0) {
    sumHtml='<p class="mu" style="text-align:center;padding:20px 0">Nenhum veiculo cadastrado.</p>';
    sumHtml+='<div style="text-align:center;margin-top:12px"><button class="btn bp" onclick="navigate(PEST)">+ Cadastrar veiculo</button></div>';
  } else {
    sumHtml='<table><thead><tr><th>Veiculo</th><th>Status</th><th class="tr">Custo</th></tr></thead><tbody>';
    var maxShow=Math.min(6,state.vehicles.length);
    for (var vi=0; vi<maxShow; vi++) {
      var vv=state.vehicles[vi]; var pp2=purchaseByVehicle(vv.id);
      sumHtml+='<tr><td><div style="font-weight:500">'+vv.marca+' '+vv.modelo+'</div>';
      sumHtml+='<div class="mu">'+vv.ano+(vv.placa?' - '+vv.placa:'')+'</div></td>';
      sumHtml+='<td>'+statusBadge(vv.status)+'</td>';
      sumHtml+='<td class="tr">'+(pp2?fmtBRL(pp2.valor):'-')+'</td></tr>';
    }
    sumHtml+='</tbody></table>';
  }

  return alertHtml+
    '<div class="kgrid">'+
    '<div class="kc"><div class="ki" style="background:#dbeafe">&#x1F697;</div><div><div class="lb">Em Estoque</div><div class="vl">'+estoque.length+'</div><div class="sb">'+reservado.length+' reservado(s)</div></div></div>'+
    '<div class="kc"><div class="ki" style="background:#fee2e2">&#x1F6D2;</div><div><div class="lb">Total Investido</div><div class="vl" style="font-size:1.1rem">'+fmtBRL(totalInvest)+'</div><div class="sb">em '+(estoque.length+reservado.length)+' veiculo(s)</div></div></div>'+
    '<div class="kc"><div class="ki" style="background:#dcfce7">&#x2705;</div><div><div class="lb">Total Vendido</div><div class="vl" style="font-size:1.1rem">'+fmtBRL(totalReceb)+'</div><div class="sb">'+vendidos.length+' venda(s)</div></div></div>'+
    '<div class="kc"><div class="ki" style="background:'+(lucro>=0?'#dcfce7':'#fee2e2')+'">&#x1F4B9;</div><div><div class="lb">Lucro Total</div><div class="vl '+lucroClass+'" style="font-size:1.1rem">'+fmtBRL(lucro)+'</div><div class="sb">'+margemStr+'</div></div></div>'+
    '<div class="kc"><div class="ki" style="background:#fef3c7">&#x1F4C5;</div><div><div class="lb">A Receber (Parcelas)</div><div class="vl" style="font-size:1.1rem">'+fmtBRL(totalParc-totalRecebParc)+'</div><div class="sb">'+(vencidas>0?'<span style="color:var(--danger)">'+vencidas+' vencida(s)</span>':aVencer30+' a vencer em 30d')+'</div></div></div>'+
    '</div>'+
    '<div class="dg">'+
    '<div class="card"><div class="ch"><h2>Atividade Recente</h2></div><div class="cb">'+actHtml+'</div></div>'+
    '<div class="card"><div class="ch"><h2>Resumo do Estoque</h2><button class="btn bp bsm" onclick="navigate(PEST)">Ver tudo</button></div><div class="cb">'+sumHtml+'</div></div>'+
    '</div>';
}

function saveVehicle(e) {
  e.preventDefault();
  var d=formToObj(e.target); var id=d.vid; delete d.vid;
  if (id) {
    for (var i=0; i<state.vehicles.length; i++) {
      if (state.vehicles[i].id===id){ state.vehicles[i]=Object.assign({},state.vehicles[i],d); break; }
    }
    showToast('Veiculo atualizado!');
  } else {
    d.id=genId(); state.vehicles.push(d); showToast('Veiculo cadastrado!');
  }
  saveState(); closeModal(); renderPage(PEST);
}

function deleteVehicle(id) {
  var v=vehicleById(id);
  showConfirm('Excluir "'+vehicleLabel(v)+'"? Os registros de compra e venda tambem serao removidos.').then(function(ok){
    if(!ok) return;
    state.vehicles=state.vehicles.filter(function(x){return x.id!==id;});
    state.purchases=state.purchases.filter(function(x){return x.vehicleId!==id;});
    state.sales=state.sales.filter(function(x){return x.vehicleId!==id;});
    saveState(); showToast('Veiculo excluido.','error'); renderPage(PEST);
  });
}

function openVendaForm(id) {
  var s=null;
  for (var i=0; i<state.sales.length; i++) { if(state.sales[i].id===id){s=state.sales[i];break;} }
  var soldIds={};
  for (var k=0; k<state.sales.length; k++) soldIds[state.sales[k].vehicleId]=true;
  var vOpts='';
  var vehs=id?state.vehicles:state.vehicles.filter(function(v){return !soldIds[v.id];});
  for (var j=0; j<vehs.length; j++) {
    var vv=vehs[j];
    vOpts+='<option value="'+vv.id+'"'+(s&&vv.id===s.vehicleId?' selected':'')+'>'+vehicleLabel(vv)+'</option>';
  }
  var pgtos=['','Dinheiro','PIX','Transferencia','Cheque','Financiamento','Outro']; var pgtoOpts='';
  for (var gi=0; gi<pgtos.length; gi++) { pgtoOpts+='<option'+(prop(s,'formaPgto')===pgtos[gi]?' selected':'')+'>'+pgtos[gi]+'</option>'; }
  var html='<form id="vdf" onsubmit="saveVenda(event)">'+
    '<input type="hidden" name="sid" value="'+(id||'')+'">'+
    '<div class="fg">'+
    '<div class="fd ffc"><label>Veiculo *</label>'+
    '<select name="vehicleId" required'+(s?' disabled':'')+'>'+
    '<option value="">Selecione um veiculo</option>'+vOpts+'</select>'+
    (s?'<input type="hidden" name="vehicleId" value="'+s.vehicleId+'">':'')+
    '</div>'+
    '<div class="fd"><label>Data da Venda</label><input type="date" name="data" value="'+prop(s,'data','')+'"></div>'+
    '<div class="fd"><label>Valor de Venda (R$) *</label><input type="number" name="valor" value="'+prop(s,'valor')+'" placeholder="0.00" min="0" step="0.01" required></div>'+
    '<div class="fd"><label>Nome do Comprador</label><input type="text" name="comprador" value="'+prop(s,'comprador')+'" placeholder="Nome completo"></div>'+
    '<div class="fd"><label>Contato</label><input type="text" name="contato" value="'+prop(s,'contato')+'" placeholder="Telefone ou e-mail"></div>'+
    '<div class="fd"><label>Forma de Pagamento</label><select name="formaPgto">'+pgtoOpts+'</select></div>'+
    '<div class="fd ffc"><label>Observacoes</label><textarea name="obs">'+prop(s,'obs')+'</textarea></div>'+
    '</div>'+
    '<div class="fa"><button type="button" class="btn bg2" onclick="closeModal()">Cancelar</button><button type="submit" class="btn bs">&#x1F4BE; Salvar</button></div>'+
    '</form>';
  openModal(s?'Editar Venda':'Registrar Venda', html);
}

function saveVenda(e) {
  e.preventDefault();
  var d=formToObj(e.target); var id=d.sid; delete d.sid;
  if (!d.vehicleId) { showToast('Selecione um veiculo.','error'); return; }
  if (id) {
    for (var i=0; i<state.sales.length; i++) {
      if(state.sales[i].id===id){ state.sales[i]=Object.assign({},state.sales[i],d); break; }
    }
    showToast('Venda atualizada!');
  } else {
    if (saleByVehicle(d.vehicleId)) { showToast('Este veiculo ja foi vendido.','error'); return; }
    d.id=genId(); state.sales.push(d);
    for (var j=0; j<state.vehicles.length; j++) {
      if(state.vehicles[j].id===d.vehicleId){ state.vehicles[j].status='vendido'; break; }
    }
    showToast('Venda registrada!');
  }
  saveState(); closeModal(); renderPage(PVEN);
}

function deleteVenda(id) {
  var s=null;
  for (var i=0; i<state.sales.length; i++) { if(state.sales[i].id===id){s=state.sales[i];break;} }
  showConfirm('Excluir esta venda? O veiculo voltara ao estoque como Disponivel.').then(function(ok){
    if(!ok) return;
    if(s){ for(var j=0;j<state.vehicles.length;j++){ if(state.vehicles[j].id===s.vehicleId&&state.vehicles[j].status==='vendido'){state.vehicles[j].status='disponivel';break;} } }
    state.sales=state.sales.filter(function(x){return x.id!==id;});
    saveState(); showToast('Venda excluida.','error'); renderPage(PVEN);
  });
}

/* ---- PARCELAMENTOS ---- */
var parcelQ='';

function pageParcelamentos() {
  var today=todayISO();
  var list=state.parcelamentos;
  if (parcelQ) {
    var q=parcelQ.toLowerCase();
    list=list.filter(function(g){ return g.comprador.toLowerCase().indexOf(q)!==-1||(g.veiculo||'').toLowerCase().indexOf(q)!==-1; });
  }

  // Compute overdue/upcoming totals
  var totalVencido=0, totalAVencer=0, totalPago=0, totalGeral=0;
  for (var ai=0; ai<state.parcelamentos.length; ai++) {
    var ag=state.parcelamentos[ai];
    for (var aj=0; aj<ag.parcelas.length; aj++) {
      var ap=ag.parcelas[aj]; totalGeral+=ap.valor;
      if (ap.pago) { totalPago+=ap.valor; continue; }
      var dd=diffDays(ap.vencimento, today);
      if (dd<0) totalVencido+=ap.valor;
      else totalAVencer+=ap.valor;
    }
  }

  // Alert
  var alertHtml='';
  var vencGrupos=[];
  for (var vi=0; vi<state.parcelamentos.length; vi++) {
    var vg=state.parcelamentos[vi];
    for (var vj=0; vj<vg.parcelas.length; vj++) {
      var vp=vg.parcelas[vj];
      if (!vp.pago && diffDays(vp.vencimento, today)<0) { vencGrupos.push(vg.comprador+(vg.veiculo?' ('+vg.veiculo+')':'')); break; }
    }
  }
  if (vencGrupos.length) {
    alertHtml='<div class="alert-bar">&#x26A0;&#xFE0F; Parcelas VENCIDAS: '+vencGrupos.join(', ')+'</div>';
  }

  // Build blocks
  var blocksHtml='';
  for (var bi=0; bi<list.length; bi++) {
    var grupo=list[bi];
    var pago=0, pendente=0, vencidas=0, proxVenc='';
    for (var bj=0; bj<grupo.parcelas.length; bj++) {
      var parc=grupo.parcelas[bj];
      if (parc.pago) pago++;
      else {
        pendente++;
        if (!proxVenc||parc.vencimento<proxVenc) proxVenc=parc.vencimento;
        if (diffDays(parc.vencimento, today)<0) vencidas++;
      }
    }
    var total2=0;
    for (var bt=0; bt<grupo.parcelas.length; bt++) total2+=grupo.parcelas[bt].valor;
    var pagoPct=grupo.parcelas.length?Math.round(pago/grupo.parcelas.length*100):0;
    var hdrClass=vencidas>0?'border-left:4px solid var(--danger)':pendente===0?'border-left:4px solid var(--success)':'';

    var parcsHtml='';
    for (var pk=0; pk<grupo.parcelas.length; pk++) {
      var p2=grupo.parcelas[pk];
      var pst=parcelaBadge(p2, today);
      var btnPago=p2.pago
        ?('<button class="btn bg2 bsm" onclick="unmarkPago(\''+ grupo.id +'\','+pk+')">Desfazer</button>')
        :('<button class="btn bs bsm" onclick="markPago(\''+ grupo.id +'\','+pk+')">Marcar Pago</button>');
      parcsHtml+='<div class="parc-row">'+
        '<div class="parc-num">'+(p2.num||String(pk+1))+'</div>'+
        '<div class="parc-date">'+fmtDate(p2.vencimento)+'</div>'+
        '<div class="parc-val">'+fmtBRL(p2.valor)+'</div>'+
        '<div class="parc-sta">'+pst+'</div>'+
        '<div class="parc-btn">'+btnPago+'</div>'+
        '</div>';
    }

    var blockId='pb'+bi;
    blocksHtml+='<div class="parc-block">'+
      '<div class="parc-hdr" onclick="toggleParcBlock(\''+ blockId +'\')" style="'+hdrClass+'">'+
      '<div>'+
      '<div style="font-weight:600;font-size:.92rem">'+grupo.comprador+(grupo.veiculo?' <span class="mu">'+grupo.veiculo+'</span>':'')+'</div>'+
      '<div class="mu" style="margin-top:3px">'+pago+'/'+grupo.parcelas.length+' pagas &middot; Total: '+fmtBRL(total2)+(proxVenc?' &middot; Prox: '+fmtDate(proxVenc):'')+'</div>'+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:10px;flex-shrink:0">'+
      (vencidas>0?'<span class="badge bd">'+vencidas+' vencida(s)</span>':pendente===0?'<span class="badge bg">Quitado</span>':'<span class="badge by">'+pendente+' pendente(s)</span>')+
      '<div class="prog-bar-bg"><div class="prog-bar'+(pagoPct===0?' zero':pagoPct<100?' partial':'')+'" style="width:'+pagoPct+'%"></div></div>'+
      '<button class="btn bg2 bsm bic" onclick="event.stopPropagation();openParcelamentoForm(\''+ grupo.id +'\')" title="Editar">&#x270F;&#xFE0F;</button>'+
      '<button class="btn bd bsm bic" onclick="event.stopPropagation();deleteParcelamento(\''+ grupo.id +'\')" title="Excluir grupo">&#x1F5D1;</button>'+
      '</div>'+
      '</div>'+
      '<div class="parc-body" id="'+blockId+'">'+parcsHtml+'</div>'+
      '</div>';
  }

  if (list.length===0) {
    blocksHtml='<div class="es"><div class="ic">&#x1F4C5;</div><p>Nenhum parcelamento encontrado. Clique em &quot;+ Novo Parcelamento&quot; para comecar.</p></div>';
  }

  return alertHtml+
    '<div class="kgrid">'+
    '<div class="kc"><div class="ki" style="background:#dcfce7">&#x2705;</div><div><div class="lb">Total Recebido</div><div class="vl" style="font-size:1.1rem">'+fmtBRL(totalPago)+'</div><div class="sb">de '+state.parcelamentos.length+' grupos</div></div></div>'+
    '<div class="kc"><div class="ki" style="background:#fee2e2">&#x26A0;&#xFE0F;</div><div><div class="lb">Vencido (nao pago)</div><div class="vl ln" style="font-size:1.1rem">'+fmtBRL(totalVencido)+'</div><div class="sb">valor em atraso</div></div></div>'+
    '<div class="kc"><div class="ki" style="background:#fef3c7">&#x1F4C5;</div><div><div class="lb">A Receber</div><div class="vl" style="font-size:1.1rem">'+fmtBRL(totalAVencer)+'</div><div class="sb">parcelas futuras</div></div></div>'+
    '<div class="kc"><div class="ki" style="background:#dbeafe">&#x1F4B0;</div><div><div class="lb">Total Geral</div><div class="vl" style="font-size:1.1rem">'+fmtBRL(totalGeral)+'</div><div class="sb">'+state.parcelamentos.length+' grupos cadastrados</div></div></div>'+
    '</div>'+
    '<div class="sb-w">'+
    '<div class="si-w"><span class="si-ic">&#x1F50D;</span><input type="text" placeholder="Buscar por comprador ou veiculo..." value="'+parcelQ+'" oninput="parcelQ=this.value;renderPage(PPARCL)"></div>'+
    '<button class="btn bp" onclick="openParcelamentoForm(String())">+ Novo Parcelamento</button>'+
    '</div>'+
    '<div>'+blocksHtml+'</div>';
}

function toggleParcBlock(id) {
  var el=document.getElementById(id);
  if (!el) return;
  if (el.classList.contains('open')) el.classList.remove('open');
  else el.classList.add('open');
}

function markPago(groupId, idx) {
  for (var i=0; i<state.parcelamentos.length; i++) {
    if (state.parcelamentos[i].id===groupId) {
      state.parcelamentos[i].parcelas[idx].pago=true;
      saveState(); showToast('Parcela marcada como paga!'); renderPage(PPARCL); return;
    }
  }
}

function unmarkPago(groupId, idx) {
  for (var i=0; i<state.parcelamentos.length; i++) {
    if (state.parcelamentos[i].id===groupId) {
      state.parcelamentos[i].parcelas[idx].pago=false;
      saveState(); showToast('Parcela desmarcada.','info'); renderPage(PPARCL); return;
    }
  }
}

function deleteParcelamento(id) {
  showConfirm('Excluir este grupo de parcelamento?').then(function(ok){
    if(!ok) return;
    state.parcelamentos=state.parcelamentos.filter(function(g){return g.id!==id;});
    saveState(); showToast('Parcelamento excluido.','error'); renderPage(PPARCL);
  });
}

var _peCount=0;

function _peRow(idx, num, vencimento, valor, pago) {
  return '<div class="pe-row" id="per'+idx+'">'+
    '<span class="pe-num">'+(idx+1)+'</span>'+
    '<input type="date" data-f="venc" value="'+vencimento+'" required>'+
    '<input type="number" data-f="val" value="'+valor+'" step="0.01" min="0" placeholder="0.00" required>'+
    '<label class="pe-ck"><input type="checkbox" data-f="pago"'+(pago?' checked':'')+'> Pago</label>'+
    '<button type="button" class="btn bg2 bsm bic" onclick="removePeRow('+idx+')">&#x2715;</button>'+
    '</div>';
}

function removePeRow(idx) {
  var el=document.getElementById('per'+idx);
  if(el&&el.parentNode) el.parentNode.removeChild(el);
  _reNumberPeRows();
}

function _reNumberPeRows() {
  var rows=document.querySelectorAll('#pe-list .pe-row');
  for(var i=0;i<rows.length;i++) {
    var sp=rows[i].querySelector('.pe-num');
    if(sp) sp.textContent=String(i+1);
  }
}

function addPeRow() {
  var list=document.getElementById('pe-list');
  if(!list) return;
  var el=document.createElement('div');
  el.innerHTML=_peRow(_peCount, _peCount+1, todayISO(), '', false);
  list.appendChild(el.firstChild);
  _peCount++;
  _reNumberPeRows();
}

function _collectParcelas() {
  var rows=document.querySelectorAll('#pe-list .pe-row');
  var parcelas=[];
  for(var i=0;i<rows.length;i++){
    var venc=rows[i].querySelector('[data-f="venc"]');
    var val=rows[i].querySelector('[data-f="val"]');
    var pago=rows[i].querySelector('[data-f="pago"]');
    if(!venc||!val) continue;
    parcelas.push({num:String(i+1), vencimento:venc.value, valor:parseFloat(val.value)||0, pago:pago?pago.checked:false});
  }
  return parcelas;
}

      '<div class="fd"><label>Veiculo</label><input type="text" name="veiculo" value="'+prop(grupo,'veiculo')+'"></div>'+

      '</div>'+

function saveParcelamento(e) {
  e.preventDefault();
  var d=formToObj(e.target);
  var id=d.pid; delete d.pid;
  var modo=d.modo; delete d.modo;

  if (modo==='edit') {
    var parcelas=_collectParcelas();
    if(parcelas.length===0){ showToast('Adicione pelo menos uma parcela.','error'); return; }
    for (var j=0; j<state.parcelamentos.length; j++) {
      if(state.parcelamentos[j].id===id){
        state.parcelamentos[j].comprador=d.comprador;
        state.parcelamentos[j].veiculo=d.veiculo;
        state.parcelamentos[j].parcelas=parcelas;
        break;
      }
    }
    showToast('Parcelamento atualizado!');
  } else {
    var n=parseInt(d.numParcelas)||1;
    var val=parseFloat(d.valorParcela)||0;
    var dataIni=d.dataInicio;
    var diaVenc=parseInt(d.diaVenc)||10;
    var newParc=[];
    for (var i=0; i<n; i++) {
      var dt=new Date(dataIni+'T12:00:00');
      dt.setMonth(dt.getMonth()+i);
      dt.setDate(diaVenc);
      var mm=dt.getMonth()+1; var dd2=dt.getDate();
      var isoD=dt.getFullYear()+'-'+(mm<10?'0':'')+mm+'-'+(dd2<10?'0':'')+dd2;
      newParc.push({num:String(i+1), vencimento:isoD, valor:val, pago:false});
    }
    state.parcelamentos.push({id:genId(), comprador:d.comprador, veiculo:d.veiculo, parcelas:newParc});
    showToast('Parcelamento cadastrado!');
  }
  saveState(); closeModal(); renderPage(PPARCL);
}

/* ---- RELATORIOS ---- */
function pageRelatorios() {
  var rows=[];
  for (var i=0; i<state.vehicles.length; i++) {
    var v=state.vehicles[i]; var p=purchaseByVehicle(v.id); var s=saleByVehicle(v.id);
    var custo=Number(p?p.valor:0)+Number(p?p.custoExtra:0);
    var venda=Number(s?s.valor:0);
    var lucro=s?venda-custo:null;
    var margem=(custo&&lucro!==null)?(lucro/custo*100):null;
    rows.push({v:v,p:p,s:s,custo:custo,venda:venda,lucro:lucro,margem:margem});
  }
  var vendidos=rows.filter(function(r){return r.s;});
  var totalCusto=0, totalVenda=0;
  for (var j=0; j<vendidos.length; j++) { totalCusto+=vendidos[j].custo; totalVenda+=vendidos[j].venda; }
  var totalLucro=totalVenda-totalCusto;
  var margemMedia=vendidos.length&&totalCusto?(totalLucro/totalCusto*100):0;
  var emEstoque=rows.filter(function(r){return !r.s&&r.p;});
  var invEstoque=0; for (var e=0; e<emEstoque.length; e++) invEstoque+=emEstoque[e].custo;
  var maxLucro=1;
  for (var ml=0; ml<vendidos.length; ml++) { if(Math.abs(vendidos[ml].lucro||0)>maxLucro) maxLucro=Math.abs(vendidos[ml].lucro||0); }
  var pgtoMap={};
  for (var ps=0; ps<state.sales.length; ps++) {
    var k=state.sales[ps].formaPgto||'Nao inf.';
    pgtoMap[k]=(pgtoMap[k]||0)+1;
  }
  var pgtoEntries=[]; for (var pk in pgtoMap) pgtoEntries.push([pk,pgtoMap[pk]]);
  pgtoEntries.sort(function(a,b){return b[1]-a[1];});
  var lucroClass=totalLucro>=0?'lp':'ln';
  var lucroRows='';
  if (vendidos.length===0) {
    lucroRows='<div class="es" style="padding:30px"><p>Nenhuma venda registrada ainda.</p></div>';
  } else {
    vendidos.sort(function(a,b){return (b.lucro||0)-(a.lucro||0);});
    lucroRows='<table class="pbt"><thead><tr><th>Veiculo</th><th class="tr">Custo</th><th class="tr">Venda</th><th class="tr">Lucro</th><th>Margem</th></tr></thead><tbody>';
    for (var li=0; li<vendidos.length; li++) {
      var r=vendidos[li]; var lc=(r.lucro||0)>=0?'lp':'ln';
      var bw=Math.round(Math.abs(r.lucro||0)/maxLucro*100); var bc=(r.lucro||0)<0?' ng':'';
      lucroRows+='<tr><td>'+vehicleLabel(r.v)+'</td>'+
        '<td class="tr">'+fmtBRL(r.custo)+'</td>'+
        '<td class="tr">'+fmtBRL(r.venda)+'</td>'+
        '<td class="tr"><span class="'+lc+'">'+fmtBRL(r.lucro)+'</span></td>'+
        '<td><div class="pbw"><div class="pb'+bc+'" style="width:'+bw+'px"></div>'+
        '<span class="'+lc+'" style="font-size:.78rem">'+(r.margem!==null?r.margem.toFixed(1)+'%':'-')+'</span></div></td></tr>';
    }
    lucroRows+='</tbody></table>';
  }
  var pgtoHtml='';
  if (pgtoEntries.length===0) {
    pgtoHtml='<p class="mu" style="text-align:center;padding:20px 0">Sem dados ainda.</p>';
  } else {
    pgtoHtml='<table><thead><tr><th>Forma</th><th class="tr">Qtd</th><th class="tr">%</th></tr></thead><tbody>';
    for (var pi2=0; pi2<pgtoEntries.length; pi2++) {
      var pct=state.sales.length?((pgtoEntries[pi2][1]/state.sales.length)*100).toFixed(0)+'%':'-';
      pgtoHtml+='<tr><td>'+pgtoEntries[pi2][0]+'</td><td class="tr">'+pgtoEntries[pi2][1]+'</td><td class="tr">'+pct+'</td></tr>';
    }
    pgtoHtml+='</tbody></table>';
  }
  var allRows='';
  if (rows.length===0) {
    allRows='<div class="es" style="padding:30px"><div class="ic">&#x1F697;</div><p>Nenhum veiculo cadastrado.</p></div>';
  } else {
    allRows='<table class="pbt"><thead><tr><th>Veiculo</th><th>Status</th><th>Compra</th><th class="tr">Custo</th><th>Venda</th><th class="tr">Valor</th><th class="tr">Lucro</th></tr></thead><tbody>';
    for (var ri=0; ri<rows.length; ri++) {
      var row=rows[ri]; var rlc=row.lucro!==null?(row.lucro>=0?'lp':'ln'):'';
      var rls=row.lucro!==null?'<span class="'+rlc+'">'+fmtBRL(row.lucro)+'</span>':'-';
      allRows+='<tr><td>'+vehicleLabel(row.v)+'</td><td>'+statusBadge(row.v.status)+'</td>'+
        '<td>'+(row.p&&row.p.data?fmtDate(row.p.data):'-')+'</td><td class="tr">'+(row.custo?fmtBRL(row.custo):'-')+'</td>'+
        '<td>'+(row.s&&row.s.data?fmtDate(row.s.data):'-')+'</td><td class="tr">'+(row.venda?fmtBRL(row.venda):'-')+'</td>'+
        '<td class="tr">'+rls+'</td></tr>';
    }
    allRows+='<tr style="background:var(--g50);font-weight:700"><td colspan="3">TOTAL (vendidos)</td>'+
      '<td class="tr">'+fmtBRL(totalCusto)+'</td><td></td><td class="tr">'+fmtBRL(totalVenda)+'</td>'+
      '<td class="tr"><span class="'+lucroClass+'">'+fmtBRL(totalLucro)+'</span></td></tr>';
    allRows+='</tbody></table>';
  }
  return '<div class="kgrid">'+
    '<div class="kc"><div class="ki" style="background:#fee2e2">&#x1F4B8;</div><div><div class="lb">Total Comprado</div><div class="vl" style="font-size:1.05rem">'+fmtBRL(totalCusto)+'</div><div class="sb">'+vendidos.length+' veiculo(s) vendido(s)</div></div></div>'+
    '<div class="kc"><div class="ki" style="background:#dcfce7">&#x1F4B5;</div><div><div class="lb">Total Recebido</div><div class="vl" style="font-size:1.05rem">'+fmtBRL(totalVenda)+'</div><div class="sb">em '+vendidos.length+' venda(s)</div></div></div>'+
    '<div class="kc"><div class="ki" style="background:'+(totalLucro>=0?'#dcfce7':'#fee2e2')+'">&#x1F4C8;</div><div><div class="lb">Lucro Liquido</div><div class="vl '+lucroClass+'" style="font-size:1.05rem">'+fmtBRL(totalLucro)+'</div><div class="sb">Margem: '+margemMedia.toFixed(1)+'%</div></div></div>'+
    '<div class="kc"><div class="ki" style="background:#dbeafe">&#x1F4CA;</div><div><div class="lb">Capital em Estoque</div><div class="vl" style="font-size:1.05rem">'+fmtBRL(invEstoque)+'</div><div class="sb">'+emEstoque.length+' veiculo(s)</div></div></div>'+
    '</div>'+
    '<div class="dg">'+
    '<div class="card"><div class="ch"><h2>Lucratividade por Veiculo</h2></div><div class="tw">'+lucroRows+'</div></div>'+
    '<div class="card"><div class="ch"><h2>Formas de Pagamento</h2></div><div class="cb">'+pgtoHtml+'</div></div>'+
    '</div>'+
    '<div class="card mt4"><div class="ch"><h2>Todos os Veiculos - Analise Completa</h2></div><div class="tw">'+allRows+'</div></div>';
}

/* Init */
g('tb-date').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
renderPage('dashboard');
</script>
</body>
</html>
